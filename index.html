<html lang="ko"><head><meta charset="utf-8">

<style>
  :root{--bg:#F4F5F7;--card:#FFF;--ink:#16202E;--soft:#5B6675;--line:#E4E7EC;
    --gold:#C8901E;--gold-bg:#FBF2DA;--steel:#9BB4D2;--neg:#9AA3AF}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;line-height:1.5}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
  .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--gold);font-weight:700;text-transform:uppercase}
  h1{margin:.2em 0 .1em;font-size:26px;font-weight:800;letter-spacing:-.02em}
  .sub{color:var(--soft);font-size:14px}
  .regions{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 4px}
  .pill{border:1px solid var(--line);background:var(--card);border-radius:999px;
    padding:8px 15px;font-size:14px;font-weight:600;cursor:pointer;color:var(--soft);transition:.12s}
  .pill:hover{border-color:#CBD3DD}
  .pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pill b{color:var(--gold);margin-left:4px}
  .pill.on b{color:#F1C97A}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 4px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 16px}
  .stat b{display:block;font-size:20px;font-weight:800}
  .stat span{font-size:12px;color:var(--soft)}
  .stat.gold b{color:var(--gold)}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:16px;margin-top:8px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .card h2{margin:0 0 4px;font-size:15px;font-weight:700}
  .card .hint{font-size:12px;color:var(--soft);margin-bottom:10px}
  .list{max-height:520px;overflow:auto;margin:0 -6px}
  .row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer}
  .row:hover{background:#F1F3F6}
  .row.active{background:var(--gold-bg);outline:1px solid #EAD9A8}
  .row .nm{flex:1;min-width:0}
  .row .nm b{font-size:14px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .nm span{font-size:12px;color:var(--soft)}
  .rate{font-weight:800;font-size:15px;text-align:right;white-space:nowrap}
  .rate.up{color:var(--gold)} .rate.down{color:var(--neg)}
  .star{color:var(--gold)}
  .chart-title{font-size:16px;font-weight:800;margin-bottom:2px}
  .chart-note{font-size:13px;color:var(--soft);margin-bottom:12px}
  .chart-note b{color:var(--gold)}
  svg{width:100%;height:auto;display:block}
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;font-size:13px}
  .legend .it{display:flex;align-items:center;gap:6px}
  .swatch{width:16px;height:3px;border-radius:2px;display:inline-block}
  .legend .val{color:var(--soft);font-variant-numeric:tabular-nums}
  footer{margin-top:24px;font-size:12px;color:var(--soft);text-align:center}
</style></head>

    if(pts.length<1) return "";
    return `<path d="${smooth(pts)}" fill="none" stroke="${color}" stroke-width="${w}" stroke-linejoin="round" stroke-linecap="round"/>`;
  }
  ids.filter(id=>id!==mainId).forEach(id=>g+=line(r.units[id].prices,colors[id],1.8));
  g+=line(r.units[mainId].prices,colors[mainId],3.2);
  $("#chart").innerHTML=`<svg viewBox="0 0 ${W} ${H}" role="img">${g}</svg>`;
}
function drawLegend(ids,mainId,colors){
  const r=R(), box=$("#legend"); box.innerHTML="";
  const last=pr=>{for(let i=pr.length-1;i>=0;i--)if(pr[i]!=null)return pr[i];return null;};
  [mainId,...ids.filter(i=>i!==mainId)].forEach(id=>{
    const u=r.units[id],isMain=id===mainId,el=document.createElement("div");el.className="it";
    el.innerHTML=`<span class="swatch" style="background:${colors[id]};height:${isMain?4:3}px"></span>
      ${u.name}(${u.pyeong}평) <span class="val">${fmtEok(last(u.prices))}</span>`;
    box.appendChild(el);
  });
}
function render(){
  drawRegions(); drawStats(); drawList();
  const r=R(), c=r.candidates.find(x=>x.id===activeId);
  const lastP=pr=>{for(let i=pr.length-1;i>=0;i--)if(pr[i]!=null)return pr[i];return 0;};
  // 형제 중 '현재가 높은'(내가 뒤처진 대장) 순으로 최대 6곳만 → 아실처럼 깔끔하게
  const sibs=c.sibs.filter(s=>r.units[s])
    .sort((a,b)=>lastP(r.units[b].prices)-lastP(r.units[a].prices)).slice(0,6);
  const ids=[c.id,...sibs];
  const colors={}; colors[c.id]="#C8901E";
  sibs.forEach((id,i)=>colors[id]=PALETTE[i%PALETTE.length]);
  drawChart(ids,c.id,colors); drawLegend(ids,c.id,colors);
  $("#ctitle").textContent=`${c.name} (${c.pyeong}평) · ${r.name}`;
  $("#cnote").innerHTML = c.rate>=0
    ? `옛날엔 형제들과 비슷했지만, 지금은 형제 중앙값보다 <b>${c.rate}% 저평가</b> 상태예요. (신뢰도 ${c.conf})`
    : `이 단지는 형제들보다 <b>${Math.abs(c.rate)}% 앞서</b> 있어요. (신뢰도 ${c.conf})`;
}
if(DATA.regions.length){ pickDefault(); render(); }
else { $("#list").innerHTML="<p>표시할 지역이 없어요. collect_all.py 로 먼저 데이터를 모으세요.</p>"; }
</script></body></html>
